services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: billing
      POSTGRES_PASSWORD: billing
      POSTGRES_DB: billing
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "billing"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot: run Alembic migrations, then exit 0. backend/worker wait on it.
  migrate:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://billing:billing@db:5432/billing
    depends_on:
      db:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://billing:billing@db:5432/billing
      REDIS_URL: redis://redis:6379/0
      SESSION_SECRET: dev-session-secret-change-me
      WEBHOOK_HMAC_SECRET: dev-webhook-secret-change-me
      EMAIL_WEBHOOK_TOKEN: dev-email-token-change-me
      CORS_ORIGINS: '["http://localhost:5173"]'
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/scripts:/app/scripts
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  worker:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://billing:billing@db:5432/billing
      REDIS_URL: redis://redis:6379/0
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
    command:
      ["celery", "-A", "app.workers.celery_app", "worker", "--beat", "--loglevel=info"]

  frontend:
    build:
      context: ./frontend
    environment:
      # Inside the compose network the backend is reachable by service name.
      VITE_API_PROXY_TARGET: http://backend:8000
      # Bind-mounts on Windows/WSL2 often need polling for file watching.
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      # Named volume for node_modules — keeps the container's install intact
      # and avoids the host overlay clobbering it.
      - frontend_node_modules:/app/node_modules

volumes:
  db_data:
  frontend_node_modules:
